name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Cache native build artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: epub4j-native/cpp/build
          key: native-${{ runner.os }}-${{ hashFiles('epub4j-native/cpp/CMakeLists.txt', 'epub4j-native/cpp/src/**', 'epub4j-native/cpp/include/**') }}
          restore-keys: native-${{ runner.os }}-

      - run: ./gradlew clean check --warning-mode all
        env:
          JAVA_TOOL_OPTIONS: "--enable-native-access=ALL-UNNAMED --enable-preview"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results
          path: '**/build/reports/tests/**'
