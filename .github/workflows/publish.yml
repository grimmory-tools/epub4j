name: Publish

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-native:
    name: Native ${{ matrix.classifier }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - classifier: linux-x86_64
            runner: ubuntu-latest
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so

          - classifier: linux-aarch64
            runner: ubuntu-24.04-arm
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so

          - classifier: linux-musl-x86_64
            runner: ubuntu-latest
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so
            musl_docker: true

          - classifier: linux-musl-aarch64
            runner: ubuntu-24.04-arm
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so
            musl_docker: true

          - classifier: macos-x86_64
            runner: macos-15-intel
            lib_name: libepub4j_native.dylib
            lib_path: epub4j-native/cpp/build/libepub4j_native.dylib

          - classifier: macos-aarch64
            runner: macos-14
            lib_name: libepub4j_native.dylib
            lib_path: epub4j-native/cpp/build/libepub4j_native.dylib

          - classifier: windows-x86_64
            runner: windows-latest
            lib_name: epub4j_native.dll
            lib_path: epub4j-native/cpp/build/Release/epub4j_native.dll

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        if: ${{ !matrix.musl_docker }}
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        if: ${{ !matrix.musl_docker }}

      - name: Build native library (Unix)
        if: runner.os != 'Windows' && !matrix.musl_docker
        run: ./gradlew :epub4j-native:buildNativeRelease

      - name: Build native library (musl/Alpine Docker)
        if: ${{ matrix.musl_docker }}
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/epub4j-native/cpp \
            alpine:3.21 sh -c '
              apk add --no-cache cmake g++ make git &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release &&
              cmake --build build'

      - name: Build native library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat :epub4j-native:buildNativeRelease

      - name: Verify binary exists
        shell: bash
        run: test -f "${{ matrix.lib_path }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.classifier }}
          path: ${{ matrix.lib_path }}
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: /tmp/native-binaries

      - name: Stage native binaries into resource directories
        run: |
          set -euo pipefail

          stage() {
            local classifier="$1" lib_name="$2"
            local dest="epub4j-native/java/src/main/resources/${classifier}"
            mkdir -p "${dest}"
            cp "/tmp/native-binaries/native-${classifier}/${lib_name}" "${dest}/${lib_name}"
            echo "Staged ${classifier}/${lib_name} ($(stat -c%s "${dest}/${lib_name}") bytes)"
          }

          stage linux-x86_64  libepub4j_native.so
          stage linux-aarch64 libepub4j_native.so
          stage linux-musl-x86_64  libepub4j_native.so
          stage linux-musl-aarch64 libepub4j_native.so
          stage macos-x86_64  libepub4j_native.dylib
          stage macos-aarch64 libepub4j_native.dylib
          stage windows-x86_64 epub4j_native.dll

      - run: ./gradlew :epub4j-native:verifyNativeClassifiers

      - run: ./gradlew build

      - run: ./gradlew publishAggregationToCentralPortal
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          draft: false
          prerelease: false
