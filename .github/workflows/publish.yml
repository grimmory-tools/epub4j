name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract and validate SemVer from tag
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not contain a valid SemVer version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Validated version: $VERSION"

  build-native:
    name: Native ${{ matrix.classifier }}
    runs-on: ${{ matrix.runner }}
    needs: validate-version
    strategy:
      fail-fast: true
      matrix:
        include:
          - classifier: linux-x86_64
            runner: ubuntu-latest
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so

          - classifier: linux-aarch64
            runner: ubuntu-24.04-arm
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so

          - classifier: macos-x86_64
            runner: macos-15-intel
            lib_name: libepub4j_native.dylib
            lib_path: epub4j-native/cpp/build/libepub4j_native.dylib

          - classifier: macos-aarch64
            runner: macos-14
            lib_name: libepub4j_native.dylib
            lib_path: epub4j-native/cpp/build/libepub4j_native.dylib

          - classifier: windows-x86_64
            runner: windows-latest
            lib_name: epub4j_native.dll
            lib_path: epub4j-native/cpp/build/Release/epub4j_native.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 25
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4.3.1

      - name: Build native library (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./gradlew :epub4j-native:buildNativeRelease

      - name: Build native library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat :epub4j-native:buildNativeRelease

      - name: Verify binary exists
        shell: bash
        run: test -f "${{ matrix.lib_path }}"

      - name: Upload native binary
        uses: actions/upload-artifact@v4.6.2
        with:
          name: native-${{ matrix.classifier }}
          path: ${{ matrix.lib_path }}
          retention-days: 1

  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: [validate-version, build-native]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4.3.1

      - name: Download all native binaries
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: native-*
          path: /tmp/native-binaries

      - name: Stage native binaries into resource directories
        shell: bash
        run: |
          set -euo pipefail

          stage() {
            local classifier="$1" lib_name="$2"
            local dest="epub4j-native/java/src/main/resources/${classifier}"
            mkdir -p "${dest}"
            cp "/tmp/native-binaries/native-${classifier}/${lib_name}" "${dest}/${lib_name}"
            echo "Staged ${classifier}/${lib_name} ($(stat -c%s "${dest}/${lib_name}") bytes)"
          }

          stage linux-x86_64  libepub4j_native.so
          stage linux-aarch64 libepub4j_native.so
          stage macos-x86_64  libepub4j_native.dylib
          stage macos-aarch64 libepub4j_native.dylib
          stage windows-x86_64 epub4j_native.dll

      - name: Verify all classifier binaries are present
        run: ./gradlew :epub4j-native:verifyNativeClassifiers

      - name: Build all modules
        run: ./gradlew clean build --warning-mode all
        env:
          JAVA_TOOL_OPTIONS: "--enable-native-access=ALL-UNNAMED --enable-preview"

      - name: Publish to Maven Central
        run: |
          ./gradlew publishMavenJavaPublicationToMavenCentralRepository --warning-mode all \
            -PsigningKey="${GPG_SIGNING_KEY}" \
            -PsigningPassword="${GPG_SIGNING_PASSWORD}" \
            -PcentralPortalUsername="${CENTRAL_USERNAME}" \
            -PcentralPortalPassword="${CENTRAL_PASSWORD}"
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}

      - name: Upload staging repository to Maven Central Portal
        shell: bash
        run: |
          set -euo pipefail
          echo "Uploading staging repository to Maven Central Portal..."
          curl -fsS -X POST \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/org.grimmory?publishing_type=automatic" \
            -H "Authorization: Bearer ${SONATYPE_TOKEN}"
          echo "Upload complete. Check https://central.sonatype.com/publishing/deployments"
        env:
          SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          draft: false
          prerelease: false
