name: Build Native Classifiers

on:
  workflow_dispatch:
    inputs:
      commit_to_branch:
        description: "If true, commit built native binaries into java/src/main/resources/<classifier>/ on the selected branch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  workflow_call:

permissions:
  contents: read

jobs:
  build-native:
    name: ${{ matrix.classifier }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - classifier: linux-x86_64
            runner: ubuntu-latest
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so
            gradle_args: ""

          - classifier: linux-aarch64
            runner: ubuntu-24.04-arm
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so
            gradle_args: ""

          - classifier: linux-musl-x86_64
            runner: ubuntu-latest
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so
            musl_docker: true

          - classifier: linux-musl-aarch64
            runner: ubuntu-24.04-arm
            lib_name: libepub4j_native.so
            lib_path: epub4j-native/cpp/build/libepub4j_native.so
            musl_docker: true

          - classifier: macos-x86_64
            runner: macos-15-intel
            lib_name: libepub4j_native.dylib
            lib_path: epub4j-native/cpp/build/libepub4j_native.dylib
            gradle_args: ""

          - classifier: macos-aarch64
            runner: macos-14
            lib_name: libepub4j_native.dylib
            lib_path: epub4j-native/cpp/build/libepub4j_native.dylib
            gradle_args: ""

          - classifier: windows-x86_64
            runner: windows-latest
            lib_name: epub4j_native.dll
            lib_path: epub4j-native/cpp/build/Release/epub4j_native.dll
            gradle_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        if: ${{ !matrix.musl_docker }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        if: ${{ !matrix.musl_docker }}
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build native library (Unix)
        if: runner.os != 'Windows' && !matrix.musl_docker
        shell: bash
        run: |
          ./gradlew :epub4j-native:buildNativeRelease ${{ matrix.gradle_args }}

      - name: Build native library (musl/Alpine Docker)
        if: ${{ matrix.musl_docker }}
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/epub4j-native/cpp \
            alpine:3.21 sh -c '
              apk add --no-cache cmake g++ make git &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release &&
              cmake --build build'

      - name: Build native library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\gradlew.bat :epub4j-native:buildNativeRelease ${{ matrix.gradle_args }}

      - name: Verify expected binary exists
        shell: bash
        run: |
          test -f "${{ matrix.lib_path }}"

      - name: Upload classifier artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.classifier }}
          path: ${{ matrix.lib_path }}

      - name: Stage in resources folder
        shell: bash
        run: |
          mkdir -p "epub4j-native/java/src/main/resources/${{ matrix.classifier }}"
          cp "${{ matrix.lib_path }}" "epub4j-native/java/src/main/resources/${{ matrix.classifier }}/${{ matrix.lib_name }}"

      - name: Upload staged resource artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staged-${{ matrix.classifier }}
          path: epub4j-native/java/src/main/resources/${{ matrix.classifier }}/${{ matrix.lib_name }}

  verify-all-classifiers:
    name: Verify all classifier folders
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Download staged artifacts
        if: ${{ inputs.commit_to_branch == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: staged-*
          path: /tmp/staged-native

      - name: Place staged binaries in resources
        if: ${{ inputs.commit_to_branch == 'true' }}
        shell: bash
        run: |
          mkdir -p epub4j-native/java/src/main/resources/linux-x86_64
          mkdir -p epub4j-native/java/src/main/resources/linux-aarch64
          mkdir -p epub4j-native/java/src/main/resources/linux-musl-x86_64
          mkdir -p epub4j-native/java/src/main/resources/linux-musl-aarch64
          mkdir -p epub4j-native/java/src/main/resources/macos-x86_64
          mkdir -p epub4j-native/java/src/main/resources/macos-aarch64
          mkdir -p epub4j-native/java/src/main/resources/windows-x86_64

          cp /tmp/staged-native/staged-linux-x86_64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-x86_64/libepub4j_native.so
          cp /tmp/staged-native/staged-linux-aarch64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-aarch64/libepub4j_native.so
          cp /tmp/staged-native/staged-linux-musl-x86_64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-musl-x86_64/libepub4j_native.so
          cp /tmp/staged-native/staged-linux-musl-aarch64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-musl-aarch64/libepub4j_native.so
          cp /tmp/staged-native/staged-macos-x86_64/libepub4j_native.dylib epub4j-native/java/src/main/resources/macos-x86_64/libepub4j_native.dylib
          cp /tmp/staged-native/staged-macos-aarch64/libepub4j_native.dylib epub4j-native/java/src/main/resources/macos-aarch64/libepub4j_native.dylib
          cp /tmp/staged-native/staged-windows-x86_64/epub4j_native.dll epub4j-native/java/src/main/resources/windows-x86_64/epub4j_native.dll

      - name: Verify classifier presence in branch
        if: ${{ inputs.commit_to_branch == 'true' }}
        run: ./gradlew :epub4j-native:verifyNativeClassifiers

  commit-staged-binaries:
    name: Commit staged binaries
    runs-on: ubuntu-latest
    needs: verify-all-classifiers
    if: ${{ inputs.commit_to_branch == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download staged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: staged-*
          path: /tmp/staged-native

      - name: Place staged binaries in resources
        shell: bash
        run: |
          mkdir -p epub4j-native/java/src/main/resources/linux-x86_64
          mkdir -p epub4j-native/java/src/main/resources/linux-aarch64
          mkdir -p epub4j-native/java/src/main/resources/linux-musl-x86_64
          mkdir -p epub4j-native/java/src/main/resources/linux-musl-aarch64
          mkdir -p epub4j-native/java/src/main/resources/macos-x86_64
          mkdir -p epub4j-native/java/src/main/resources/macos-aarch64
          mkdir -p epub4j-native/java/src/main/resources/windows-x86_64

          cp /tmp/staged-native/staged-linux-x86_64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-x86_64/libepub4j_native.so
          cp /tmp/staged-native/staged-linux-aarch64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-aarch64/libepub4j_native.so
          cp /tmp/staged-native/staged-linux-musl-x86_64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-musl-x86_64/libepub4j_native.so
          cp /tmp/staged-native/staged-linux-musl-aarch64/libepub4j_native.so epub4j-native/java/src/main/resources/linux-musl-aarch64/libepub4j_native.so
          cp /tmp/staged-native/staged-macos-x86_64/libepub4j_native.dylib epub4j-native/java/src/main/resources/macos-x86_64/libepub4j_native.dylib
          cp /tmp/staged-native/staged-macos-aarch64/libepub4j_native.dylib epub4j-native/java/src/main/resources/macos-aarch64/libepub4j_native.dylib
          cp /tmp/staged-native/staged-windows-x86_64/epub4j_native.dll epub4j-native/java/src/main/resources/windows-x86_64/epub4j_native.dll

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add epub4j-native/java/src/main/resources
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci(native): stage classifier binaries"
          git push
